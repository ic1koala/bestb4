<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BestB4 - 賞味期限管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  
  <style>
    :root {
      --primary: #10b981;
      --primary-light: #34d399;
      --bg-color: #ffffff;
      --surface-color: rgba(255, 255, 255, 0.7);
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --glass-bg: rgba(255, 255, 255, 0.4);
      --glass-border: rgba(255, 255, 255, 0.5);
      --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: #fbfbfd;
      background-image: 
        radial-gradient(at 0% 0%, hsla(160, 100%, 95%, 1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, hsla(190, 100%, 96%, 1) 0px, transparent 50%);
      color: var(--text-main);
      height: 100vh; width: 100vw; overflow: hidden;
      display: flex; justify-content: center; align-items: center;
    }

    #app-container {
      width: 100%; height: 100%; max-width: 480px; position: relative; overflow: hidden;
      display: flex; flex-direction: column; background: transparent;
    }

    .screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: none; flex-direction: column; z-index: 10; overflow: hidden;
      opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease;
      padding-bottom: 90px;
    }
    .screen.active { display: flex; opacity: 1; }

    /* 1. Splash Animation */
    #splash-screen {
      z-index: 1000; background: #ffffff; display: flex; justify-content: center; align-items: center; pointer-events: none; padding-bottom: 0;
    }
    .splash-container { position: relative; width: 100px; height: 100px; }
    .splash-circle {
      position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08); left: 30px; top: -300px;
      animation: fallAndBurst 2.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes fallAndBurst {
      0% { top: -300px; transform: scale(1); opacity: 0; }
      20% { opacity: 1; }
      40% { top: 30px; transform: scale(1.1); }
      50% { top: 30px; transform: scale(0.9); }
      60% { top: 30px; transform: scale(1); }
      80% { transform: scale(50); opacity: 1; filter: blur(0px); }
      100% { transform: scale(100); opacity: 0; visibility: hidden; }
    }
    
    /* 2. Authentication */
    #lock-screen {
      z-index: 900; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
      justify-content: center; align-items: center; padding: 40px; padding-bottom: 0;
    }
    .lock-card {
      background: var(--surface-color); padding: 32px; border-radius: 32px;
      border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
      width: 100%; max-width: 340px; text-align: center;
    }
    .pw-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 32px; }
    .pw-dot { width: 16px; height: 16px; border-radius: 50%; background: #e5e7eb; transition: 0.2s; }
    .pw-dot.active { background: var(--primary); transform: scale(1.2); box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
    .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; justify-items: center; }
    .num-btn {
      width: 68px; height: 68px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.02);
      background: rgba(255,255,255,0.7); font-size: 1.4rem; font-weight: 500; cursor: pointer;
      display: flex; justify-content: center; align-items: center; transition: 0.2s;
    }
    .num-btn:active { background: #f3f4f6; transform: scale(0.92); }

    /* 3. List Screen */
    .top-bar {
      padding: 60px 24px 12px; display: flex; justify-content: space-between; align-items: flex-end;
      background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 20;
    }
    .top-bar h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
    
    .filter-bar { padding: 0 24px 12px; display: flex; justify-content: space-between; align-items: center; }
    .sort-select {
      background: rgba(0,0,0,0.04); border: none; padding: 8px 12px; border-radius: 12px;
      font-size: 0.8rem; font-weight: 700; color: var(--text-muted); outline: none;
    }

    .scroll-area { flex: 1; overflow-y: auto; padding: 0 24px 120px; }
    .item-wrapper { position: relative; margin-bottom: 12px; overflow: hidden; border-radius: 20px; cursor: pointer; }
    .item-archive-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #3b82f6;
      display: flex; align-items: center; justify-content: flex-end; padding-right: 24px;
      color: #fff; font-size: 0.8rem; font-weight: 700;
    }
    .item-card {
      background: #fff; border-radius: 20px; padding: 18px;
      display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.04); position: relative; transition: transform 0.3s; z-index: 2;
    }
    .item-icon { width: 52px; height: 52px; border-radius: 16px; background: #f9fafb; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; }
    .item-qty { position: absolute; top: -5px; right: -5px; background: var(--primary); color: #fff; font-size: 0.65rem; padding: 2px 6px; border-radius: 8px; font-weight: 800; border: 2px solid #fff; }

    /* 4. Integration Tab */
    .link-section { background: #fff; border-radius: 24px; padding: 24px; margin-bottom: 20px; border: 1.5px solid #f1f5f9; }
    .link-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .link-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center; }
    
    /* 5. Entry Form Overlay */
    #entry-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 500;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
      display: none; flex-direction: column; padding: 60px 24px;
    }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; }
    .input-group input, .input-group select {
      width: 100%; padding: 14px; border-radius: 16px; border: 1.5px solid #f1f5f9; outline: none; font-size: 1rem; font-weight: 600;
    }

    /* 6. Bottom Nav */
    #bottom-nav {
      position: absolute; bottom: 24px; left: 24px; right: 24px; height: 68px;
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px);
      border-radius: 24px; border: 1px solid var(--glass-border);
      display: none; justify-content: space-around; align-items: center; z-index: 100;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); cursor: pointer; transition: 0.2s; font-size: 0.65rem; font-weight: 700; width: 18%; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn svg { width: 22px; height: 22px; stroke-width: 2.2; }
    .nav-cam-btn { width: 56px; height: 56px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; transform: translateY(-15px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); border: 4px solid #fff; }

    #toast { position: absolute; top: 44px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #1f2937; color: #fff; padding: 12px 24px; border-radius: 40px; font-size: 0.85rem; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 2000; text-align: center; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .spinner { width: 28px; height: 28px; border: 3px solid #f3f4f6; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

<div id="app-container">
  
  <div id="toast">メッセージ</div>

  <!-- 1. Splash Screen -->
  <div id="splash-screen" class="screen active">
    <div class="splash-container">
      <div class="splash-circle"></div>
    </div>
  </div>

  <!-- 2. Lock Screen -->
  <div id="lock-screen" class="screen">
    <div class="lock-card">
      <h2 style="color:var(--primary); font-weight:800; margin-bottom:8px;">BestB4</h2>
      <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:24px;">暗証番号を入力してください</p>
      <div class="pw-dots" id="pw-dots">
        <div class="pw-dot"></div><div class="pw-dot"></div><div class="pw-dot"></div><div class="pw-dot"></div>
      </div>
      <div class="num-pad">
        <button class="num-btn" onclick="app.pressKey(1)">1</button>
        <button class="num-btn" onclick="app.pressKey(2)">2</button>
        <button class="num-btn" onclick="app.pressKey(3)">3</button>
        <button class="num-btn" onclick="app.pressKey(4)">4</button>
        <button class="num-btn" onclick="app.pressKey(5)">5</button>
        <button class="num-btn" onclick="app.pressKey(6)">6</button>
        <button class="num-btn" onclick="app.pressKey(7)">7</button>
        <button class="num-btn" onclick="app.pressKey(8)">8</button>
        <button class="num-btn" onclick="app.pressKey(9)">9</button>
        <div></div>
        <button class="num-btn" onclick="app.pressKey(0)">0</button>
        <button class="num-btn" onclick="app.clearKey()">✕</button>
      </div>
    </div>
  </div>

  <!-- 3. List Screen -->
  <div id="list-screen" class="screen">
    <div class="top-bar">
      <div>
        <div id="today-date" style="font-size:0.8rem; color:var(--text-muted); font-weight:600;">2026年3月21日</div>
        <h1>冷蔵庫リスト</h1>
      </div>
      <button onclick="app.shareApp()" style="background:var(--primary); border:none; padding:8px 16px; border-radius:12px; color:#fff; font-weight:700; font-size:0.8rem; display:flex; align-items:center; gap:6px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        共有
      </button>
    </div>

    <div class="filter-bar">
      <div class="search-inner" style="flex:1; margin-right:12px; padding:8px 12px; background:rgba(0,0,0,0.04); border-radius:12px; display:flex; gap:8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="検索..." oninput="app.renderList()" style="border:none; background:transparent; font-size:0.85rem; outline:none; width:100%;">
      </div>
      <select class="sort-select" id="sort-order" onchange="app.renderList()">
        <option value="exp">期限順</option>
        <option value="alpha">あいうえお順</option>
        <option value="qty">数量順</option>
      </select>
    </div>

    <div class="scroll-area" id="item-list"></div>
  </div>

  <!-- 4. Camera Screen -->
  <div id="camera-screen" class="screen" style="background:#000; padding-bottom:0;">
    <div style="height:60%; position:relative; display:flex; justify-content:center; align-items:center;">
      <video id="video-preview" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
      <div style="position:absolute; width:80%; height:40%; border:2px dashed #fff; border-radius:24px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);"></div>
      <div style="position:absolute; top:60px; left:24px; color:#fff; font-weight:800; font-size:1.2rem;" onclick="app.stopCamera()">✕</div>
    </div>
    <div style="flex:1; background:#fff; border-radius:32px 32px 0 0; margin-top:-24px; padding:32px 24px; z-index:20;">
      <div class="nav-cam-btn" onclick="app.captureAndOCR()" style="margin:0 auto 20px; transform:translateY(-56px);">
        <svg viewBox="0 0 24 24" fill="none" stroke="white"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <div id="ocr-status" style="text-align:center; font-size:0.9rem; font-weight:700; color:var(--text-muted); margin-top:-40px; margin-bottom:20px;">AIが自動読込します</div>
      <button onclick="app.openManualEntry()" style="width:100%; padding:16px; border-radius:18px; border:2px solid #f1f5f9; background:#fff; font-weight:800; color:var(--text-muted); font-size:1rem;">手入力で登録する</button>
    </div>
  </div>

  <!-- 5. Integration Tab -->
  <div id="link-screen" class="screen" style="padding:60px 24px;">
    <h2 style="font-weight:800; margin-bottom:24px;">外部サービス連係</h2>
    
    <div class="link-section">
      <div class="link-row">
        <div class="link-icon" style="background:#4285f4;"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M21.35 11.1H12.18v3.57h5.27c-.23 1.25-.94 2.31-2 2.98v2.48h3.24c1.89-1.74 2.98-4.3 2.98-7.39 0-.64-.06-1.26-.18-1.84z"/></svg></div>
        <div style="flex:1;"><p style="font-weight:700;">Google カレンダー</p><p style="font-size:0.75rem; color:var(--text-muted);">賞味期限をカレンダーに自動追加</p></div>
        <button onclick="app.showToast('Google認証を開始します...')" style="padding:6px 14px; border-radius:10px; border:none; background:#f1f5f9; font-weight:700; font-size:0.75rem;">連係</button>
      </div>
      <div style="background:#f8fafc; border-radius:12px; padding:12px; font-size:0.8rem; color:var(--text-muted);">
        [ プレビュー窓 ]<br>
        次回の登録アイテム: 牛乳 (03/24)
      </div>
    </div>

    <div class="link-section">
      <div class="link-row">
        <div class="link-icon" style="background:#06c755;"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M24 10.3c0-4.7-5.4-8.5-12-8.5S0 5.6 0 10.3c0 4.2 4.3 7.7 10.1 8.4-.4-.8-.4-1.3-.1-1.9 1.8.8 1.9 1.1 2 1.3V18c6.6 0 12-3.8 12-7.7z"/></svg></div>
        <div style="flex:1;"><p style="font-weight:700;">LINE 通知</p><p style="font-size:0.75rem; color:var(--text-muted);">期限切れ1週間前にメッセージを受信</p></div>
        <button onclick="app.showToast('LINE通知設定を保存しました')" style="padding:6px 14px; border-radius:10px; border:none; background:#f1f5f9; font-weight:700; font-size:0.75rem;">ON</button>
      </div>
      <div style="background:#f8fafc; border-radius:12px; padding:12px; font-size:0.8rem; color:var(--text-muted);">
        [ 通知設定 ]<br>
        通知時間: 毎日 08:00
      </div>
    </div>
  </div>

  <!-- 6. Payment Screen -->
  <div id="payment-screen" class="screen" style="padding:60px 24px;">
    <h2 style="font-weight:800; margin-bottom:24px;">プレミアムプラン</h2>
    <div style="background:linear-gradient(135deg, #10b981, #059669); padding:24px; border-radius:24px; color:#fff; box-shadow:0 15px 30px rgba(16,185,129,0.2);">
      <p style="font-weight:700; opacity:0.9;">BestB4 Premium</p>
      <div style="font-size:2rem; font-weight:800; margin:10px 0;">¥480 <span style="font-size:1rem; font-weight:400;">/ 月</span></div>
      <ul style="list-style:none; font-size:0.85rem; line-height:1.8; margin-top:15px;">
        <li>🚀 広告なし</li><li>📦 無制限保存</li><li>🔔 高度な通知設定</li>
      </ul>
    </div>
    <button onclick="app.processPayment()" style="width:100%; padding:18px; border-radius:20px; border:none; background:#1f2937; color:#fff; font-weight:800; margin-top:24px;">今すぐアップグレード</button>
  </div>

  <!-- 7. Entry Overlay (Manual / Edit) -->
  <div id="entry-overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
      <h2 id="entry-title" style="font-weight:800;">アイテム登録</h2>
      <div onclick="app.closeEntry()" style="font-weight:800; padding:10px;">✕</div>
    </div>
    <div class="input-group">
      <label>商品名</label>
      <input type="text" id="entry-name" placeholder="例: 牛乳">
    </div>
    <div style="display:flex; gap:16px;">
      <div class="input-group" style="flex:1.5;">
        <label>カテゴリー</label>
        <select id="entry-cat">
          <option>乳製品</option><option>肉類</option><option>魚介</option><option>野菜</option><option>果物</option><option>飲料</option><option>その他</option>
        </select>
      </div>
      <div class="input-group" style="flex:1;">
        <label>数量</label>
        <input type="number" id="entry-qty" value="1">
      </div>
    </div>
    <div class="input-group">
      <label>賞味期限</label>
      <input type="date" id="entry-exp">
    </div>
    <button onclick="app.saveEntry()" style="width:100%; padding:18px; border-radius:20px; border:none; background:var(--primary); color:#fff; font-weight:800; margin-top:20px; font-size:1.1rem;">保存する</button>
  </div>

  <!-- Bottom Nav -->
  <div id="bottom-nav">
    <div class="nav-btn active" onclick="app.showScreen('list-screen')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
      リスト
    </div>
    <div class="nav-btn" onclick="app.showScreen('link-screen')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      連係
    </div>
    <div class="nav-cam-btn" onclick="app.startCamera()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <div class="nav-btn" onclick="app.showToast('アーカイブ(6月間)を確認中...')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      履歴
    </div>
    <div class="nav-btn" onclick="app.showScreen('payment-screen')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      決済
    </div>
  </div>

</div>

<script>
  const app = {
    passcode: "1234", currentInput: "", db: null, stream: null, editingId: null,
    
    async init() {
      setTimeout(() => this.showScreen('lock-screen'), 2500);
      await this.initDB();
      this.updateDateLabel();
      this.renderList();
    },

    initDB() {
      return new Promise(res => {
        const req = indexedDB.open("BestB4_V2", 1);
        req.onupgradeneeded = e => {
          const store = e.target.result.createObjectStore("items", { keyPath: "id", autoIncrement: true });
          store.createIndex("name", "name", { unique: false });
        };
        req.onsuccess = e => { this.db = e.target.result; res(); };
      });
    },

    updateDateLabel() {
      const now = new Date();
      document.getElementById('today-date').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
    },

    pressKey(n) {
      if(this.currentInput.length < 4) {
        this.currentInput += n; this.updateDots();
        if(this.currentInput.length === 4) {
          setTimeout(() => {
            if(this.currentInput === this.passcode) {
              this.showScreen('list-screen'); document.getElementById('bottom-nav').style.display = 'flex';
            } else { this.showToast('エラー：暗証番号'); this.clearKey(); }
          }, 200);
        }
      }
    },
    clearKey() { this.currentInput = ""; this.updateDots(); },
    updateDots() {
      const dots = document.querySelectorAll('.pw-dot');
      dots.forEach((d, i) => i < this.currentInput.length ? d.classList.add('active') : d.classList.remove('active'));
    },

    showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => { 
        s.classList.remove('active'); 
        setTimeout(() => { if(!s.classList.contains('active')) s.style.display = 'none'; }, 400); 
      });
      const t = document.getElementById(id); t.style.display = 'flex';
      setTimeout(() => t.classList.add('active'), 50);
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const navIds = {'list-screen':0, 'link-screen':1, 'payment-screen':4};
      if(navIds[id] !== undefined) document.querySelectorAll('.nav-btn')[navIds[id]].classList.add('active');
    },

    async renderList() {
      const container = document.getElementById('item-list');
      const search = document.getElementById('search-input').value.toLowerCase();
      const sort = document.getElementById('sort-order').value;
      container.innerHTML = "";

      let items = (await this.getAllItems()).filter(i => !i.archivedAt && i.name.toLowerCase().includes(search));
      
      if(sort === 'exp') items.sort((a,b) => new Date(a.exp) - new Date(b.exp));
      else if(sort === 'alpha') items.sort((a,b) => a.name.localeCompare(b.name, 'ja'));
      else if(sort === 'qty') items.sort((a,b) => b.qty - a.qty);

      if(items.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-muted); font-size:0.9rem;">なし</div>`;
        return;
      }

      items.forEach(item => {
        const diff = Math.ceil((new Date(item.exp) - new Date()) / (86400000));
        const urgent = diff <= 3;
        const icon = this.getIcon(item.name);
        const card = document.createElement('div');
        card.className = 'item-wrapper';
        card.innerHTML = `
          <div class="item-archive-bg">整理</div>
          <div class="item-card" id="card-${item.id}">
            <div class="item-icon">${icon}<div class="item-qty">${item.qty}</div></div>
            <div class="item-main">
              <div class="item-name">${item.name}</div>
              <div class="item-meta">期限: ${item.exp}</div>
            </div>
            <div class="days-left ${urgent?'urgent':''}">${diff < 0 ? '切れ' : (diff===0?'今日':`あと${diff}日`)}</div>
          </div>
        `;
        container.appendChild(card);
        const cardEl = card.querySelector('.item-card');
        this.attachSwipe(cardEl, item.id);
        cardEl.addEventListener('click', (e) => { 
          if(!cardEl.isSwiping) this.openEdit(item); 
        });
      });
    },

    getIcon(n) {
      if(n.includes('肉')) return '🥩'; if(n.includes('卵')||n.includes('乳')) return '🥛';
      if(n.includes('菜')) return '🥬'; if(n.includes('果')) return '🍎';
      if(n.includes('魚')) return '🐟'; if(n.includes('飲')) return '🥤';
      return '🍱';
    },

    attachSwipe(el, id) {
      let startX = 0; let dragging = false;
      el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragging = true; el.isSwiping = false; el.style.transition='none'; }, {passive:true});
      el.addEventListener('touchmove', e => {
        if(!dragging) return;
        let diff = e.touches[0].clientX - startX;
        if(diff < 0) { el.style.transform = `translateX(${diff}px)`; if(diff < -10) el.isSwiping = true; }
      }, {passive:true});
      el.addEventListener('touchend', async e => {
        dragging = false; el.style.transition = 'transform 0.4s';
        if(e.changedTouches[0].clientX - startX < -100) {
          el.style.transform = 'translateX(-100%)';
          setTimeout(async () => { await this.archiveItem(id); this.renderList(); this.showToast('アーカイブしました'); }, 300);
        } else { el.style.transform = 'translateX(0)'; }
      });
    },

    async getAllItems() {
      return new Promise(res => {
        const trans = this.db.transaction("items", "readonly");
        trans.objectStore("items").getAll().onsuccess = e => res(e.target.result);
      });
    },

    async archiveItem(id) {
      const trans = this.db.transaction("items", "readwrite");
      const store = trans.objectStore("items");
      const req = store.get(id);
      req.onsuccess = () => { let i = req.result; i.archivedAt = new Date().toISOString(); store.put(i); };
    },

    // Camera & OCR
    async startCamera() {
      this.showScreen('camera-screen'); document.getElementById('bottom-nav').style.display='none';
      const video = document.getElementById('video-preview');
      try { this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); video.srcObject = this.stream; }
      catch(e) { this.showToast('カメラエラー'); }
    },
    stopCamera() {
      if(this.stream) this.stream.getTracks().forEach(t => t.stop());
      this.showScreen('list-screen'); document.getElementById('bottom-nav').style.display='flex';
    },
    async captureAndOCR() {
      const video = document.getElementById('video-preview');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      document.getElementById('ocr-status').innerText = "AI解析中...";
      try {
        const { data: { text } } = await Tesseract.recognize(canvas, 'jpn+eng');
        this.parseOCRAndOpen(text);
      } catch(e) { this.showToast('解析失敗'); document.getElementById('ocr-status').innerText = "失敗、手動で入力してください"; }
    },

    parseOCRAndOpen(text) {
      const name = text.split('\n')[0].replace(/[^\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff\uff66-\uff9fa-zA-Z]/g, '').substring(0,12) || "商品";
      const dateMatch = text.match(/20\d{2}[/.-]\d{1,2}[/.-]\d{1,2}/) || text.match(/\d{2}[/.-]\d{1,2}[/.-]\d{1,2}/);
      let date = new Date(); date.setDate(date.getDate() + 7);
      let dateStr = date.toISOString().split('T')[0];
      if(dateMatch) { dateStr = dateMatch[0].replace(/\//g, '-'); if(dateStr.length===8) dateStr = '20'+dateStr; }
      this.openManualEntry({ name, exp: dateStr, qty: 1, cat: 'その他' });
      document.getElementById('ocr-status').innerText = "読込完了";
    },

    // Entry / Edit
    openManualEntry(data = null) {
      this.editingId = null;
      document.getElementById('entry-title').innerText = "アイテム登録";
      document.getElementById('entry-name').value = data ? data.name : "";
      document.getElementById('entry-cat').value = data ? data.cat : "その他";
      document.getElementById('entry-qty').value = data ? data.qty : "1";
      document.getElementById('entry-exp').value = data ? data.exp : new Date().toISOString().split('T')[0];
      document.getElementById('entry-overlay').style.display = 'flex';
      if(this.stream) this.stream.getTracks().forEach(t => t.stop());
    },
    openEdit(item) {
      this.editingId = item.id;
      document.getElementById('entry-title').innerText = "アイテム編集";
      document.getElementById('entry-name').value = item.name;
      document.getElementById('entry-cat').value = item.cat;
      document.getElementById('entry-qty').value = item.qty;
      document.getElementById('entry-exp').value = item.exp;
      document.getElementById('entry-overlay').style.display = 'flex';
    },
    closeEntry() { document.getElementById('entry-overlay').style.display = 'none'; if(document.getElementById('camera-screen').classList.contains('active')) this.showScreen('list-screen'); document.getElementById('bottom-nav').style.display='flex'; },
    
    async saveEntry() {
      const name = document.getElementById('entry-name').value;
      const cat = document.getElementById('entry-cat').value;
      const qty = parseInt(document.getElementById('entry-qty').value) || 1;
      const exp = document.getElementById('entry-exp').value;
      
      if(!name) return this.showToast('商品名を入力してください');
      
      const trans = this.db.transaction("items", "readwrite");
      const store = trans.objectStore("items");
      
      if(this.editingId) {
        store.put({ id: this.editingId, name, cat, qty, exp, archivedAt: null });
        this.showToast('更新しました');
      } else {
        store.add({ name, cat, qty, exp, reg: new Date().toISOString().split('T')[0], archivedAt: null });
        this.showToast('登録しました');
      }
      this.closeEntry();
      this.renderList();
    },

    // OS Standard Share
    shareApp() {
      if(navigator.share) {
        navigator.share({ title: 'BestB4', text: '食品ロス削減！BestB4アプリで賞味期限を管理しています。', url: 'https://bestb4-app.demo' });
      } else { this.showToast('共有機能に対応していません'); }
    },

    showToast(m) {
      const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    },

    processPayment() { this.showToast('サブスクリプション連係中...'); setTimeout(() => { this.showToast('アップグレード完了！'); this.showScreen('list-screen'); }, 1500); }
  };

  window.onload = () => app.init();
</script>
