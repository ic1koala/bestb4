<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BestB4 - 賞味期限管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  
  <style>
    :root {
      --primary: #10b981;
      --primary-light: #34d399;
      --bg-color: #ffffff;
      --surface-color: rgba(255, 255, 255, 0.7);
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --glass-bg: rgba(255, 255, 255, 0.4);
      --glass-border: rgba(255, 255, 255, 0.5);
      --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
      --danger: #ef4444;
      --splash-bg: #ccff99;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: #fbfbfd;
      background-image: 
        radial-gradient(at 0% 0%, hsla(160, 100%, 95%, 1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, hsla(190, 100%, 96%, 1) 0px, transparent 50%);
      color: var(--text-main);
      height: 100vh; width: 100vw; overflow: hidden;
      display: flex; justify-content: center; align-items: center;
    }

    #app-container {
      width: 100%; height: 100%; max-width: 480px; position: relative; overflow: hidden;
      display: flex; flex-direction: column; background: transparent;
    }

    .screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: none; flex-direction: column; z-index: 10; overflow: hidden;
      opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease;
      padding-bottom: 90px;
    }
    .screen.active { display: flex; opacity: 1; }

    /* 1. Splash Animation */
    #splash-screen {
      z-index: 1000; background: var(--splash-bg); display: flex; justify-content: center; align-items: center; pointer-events: none; padding-bottom: 0;
      transition: background 0.6s ease, opacity 0.6s ease;
    }
    .splash-content { position: relative; text-align: center; display: flex; flex-direction: column; align-items: center; }
    .splash-logo {
      font-size: 3.5rem; font-weight: 900; color: #fff; letter-spacing: -2px; margin-top: 20px;
      opacity: 0; transform: translateY(20px); animation: logoFadeIn 2s ease 1.2s forwards;
    }
    @keyframes logoFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .splash-circle {
      width: 50px; height: 50px; background: #fff; border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: absolute; top: -400px;
      animation: fallAndBurst 4.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes fallAndBurst {
      0% { top: -400px; transform: scale(1); opacity: 0; }
      15% { opacity: 1; }
      30% { top: -60px; transform: scale(1.1); }
      35% { top: -60px; transform: scale(0.9); }
      40% { top: -60px; transform: scale(1); }
      55% { transform: scale(1); opacity: 1; }
      100% { transform: scale(100); opacity: 1; visibility: visible; }
    }

    /* 2. List Screen */
    .top-bar {
      padding: 60px 24px 12px; display: flex; justify-content: space-between; align-items: flex-end;
      background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 20;
    }
    .top-bar h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
    
    .filter-bar { padding: 0 24px 12px; display: flex; justify-content: space-between; align-items: center; }
    .sort-select {
      background: rgba(0,0,0,0.04); border: none; padding: 8px 12px; border-radius: 12px;
      font-size: 0.8rem; font-weight: 700; color: var(--text-muted); outline: none;
    }

    .main-content-layout { flex: 1; display: flex; overflow: hidden; margin-top: 10px; }
    .cat-sidebar {
      width: 76px; background: transparent; padding: 0 8px 100px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
    }
    .cat-tab {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 4px; border-radius: 16px; background: #fff;
      font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      border: 1.5px solid transparent; transition: 0.2s; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .cat-tab.active { background: var(--primary); color: #fff; transform: scale(1.05); }
    .cat-tab i { font-size: 1.2rem; margin-bottom: 4px; font-style: normal; }

    .scroll-area { flex: 1; overflow-y: auto; padding: 0 16px 120px 8px; }
    .item-card {
      background: #fff; border-radius: 20px; padding: 18px;
      display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.04); position: relative; transition: transform 0.3s; z-index: 2; margin-bottom: 12px;
    }
    .item-icon { width: 52px; height: 52px; border-radius: 16px; background: #f9fafb; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; position: relative; }
    .item-qty { position: absolute; top: -5px; right: -5px; background: var(--primary); color: #fff; font-size: 0.65rem; padding: 2px 6px; border-radius: 8px; font-weight: 800; border: 2px solid #fff; }

    /* Settings Details */
    .settings-section { background: #fff; border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1.5px solid #f1f5f9; }
    .demo-btn { width: 100%; padding: 16px; border-radius: 18px; border: 2px dashed var(--primary); background: rgba(16, 185, 129, 0.03); color: var(--primary); font-weight: 800; cursor: pointer; margin-top: 12px; transition: 0.2s; }
    .demo-btn:active { background: rgba(16, 185, 129, 0.1); transform: scale(0.98); }

    /* Bottom Nav */
    #bottom-nav {
      position: absolute; bottom: 24px; left: 24px; right: 24px; height: 68px;
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px);
      border-radius: 24px; border: 1px solid var(--glass-border);
      display: none; justify-content: space-around; align-items: center; z-index: 100;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); cursor: pointer; transition: 0.2s; font-size: 0.65rem; font-weight: 700; width: 18%; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn svg { width: 22px; height: 22px; stroke-width: 2.2; }
    .nav-cam-btn { width: 56px; height: 56px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; transform: translateY(-15px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); border: 4px solid #fff; }

    #toast { position: absolute; top: 44px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #1f2937; color: #fff; padding: 12px 24px; border-radius: 40px; font-size: 0.85rem; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 2000; text-align: center; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #entry-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 500;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
      display: none; flex-direction: column; padding: 60px 24px;
    }
  </style>
</head>
<body>

<div id="app-container">
  
  <div id="toast">メッセージ</div>

  <!-- 1. Splash Screen -->
  <div id="splash-screen" class="screen active">
    <div class="splash-content">
      <div class="splash-circle"></div>
      <div class="splash-logo">BestB4</div>
    </div>
  </div>

  <!-- 3. List Screen -->
  <div id="list-screen" class="screen">
    <div class="top-bar">
      <div>
        <div id="today-date" style="font-size:0.8rem; color:var(--text-muted); font-weight:600;">2026年3月21日</div>
        <h1>冷蔵庫リスト</h1>
      </div>
      <button onclick="app.shareApp()" style="background:var(--primary); border:none; padding:8px 16px; border-radius:12px; color:#fff; font-weight:700; font-size:0.8rem; display:flex; align-items:center; gap:6px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        共有
      </button>
    </div>

    <div class="filter-bar">
      <div class="search-inner" style="flex:1; margin-right:12px; padding:8px 12px; background:rgba(0,0,0,0.04); border-radius:12px; display:flex; gap:8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="検索..." oninput="app.renderList()" style="border:none; background:transparent; font-size:0.85rem; outline:none; width:100%;">
      </div>
      <select class="sort-select" id="sort-order" onchange="app.renderList()">
        <option value="exp">期限順</option>
        <option value="alpha">あいうえお順</option>
        <option value="qty">数量順</option>
      </select>
    </div>

    <div class="main-content-layout">
      <div class="cat-sidebar" id="category-sidebar"></div>
      <div class="scroll-area" id="item-list"></div>
    </div>
  </div>

  <!-- 4. Camera Screen -->
  <div id="camera-screen" class="screen" style="background:#000; padding-bottom:0;">
    <div style="height:60%; position:relative; display:flex; justify-content:center; align-items:center;">
      <video id="video-preview" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
      <div style="position:absolute; width:80%; height:40%; border:2px dashed #fff; border-radius:24px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);"></div>
      <div style="position:absolute; top:60px; left:24px; color:#fff; font-weight:800; font-size:1.2rem;" onclick="app.stopCamera()">✕</div>
    </div>
    <div style="flex:1; background:#fff; border-radius:32px 32px 0 0; margin-top:-24px; padding:32px 24px; z-index:20;">
      <div class="nav-cam-btn" onclick="app.captureAndOCR()" style="margin:0 auto 20px; transform:translateY(-56px);">
        <svg viewBox="0 0 24 24" fill="none" stroke="white"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <div id="ocr-status" style="text-align:center; font-size:0.9rem; font-weight:700; color:var(--text-muted); margin-top:-40px; margin-bottom:20px;">AIが自動読込します</div>
      <button onclick="app.openManualEntry()" style="width:100%; padding:16px; border-radius:18px; border:2px solid #f1f5f9; background:#fff; font-weight:800; color:var(--text-muted); font-size:1rem;">手入力で登録する</button>
    </div>
  </div>

  <!-- 5. Link Screen -->
  <div id="link-screen" class="screen" style="padding:60px 24px;">
    <h2 style="font-weight:800; margin-bottom:24px;">外部サービス連係</h2>
    <div class="settings-section">
      <div style="display:flex; align-items:center; gap:16px;">
        <div style="width:44px; height:44px; background:#4285f4; border-radius:12px; display:flex; justify-content:center; align-items:center;"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M21.35 11.1H12.18v3.57h5.27c-.23 1.25-.94 2.31-2 2.98v2.48h3.24c1.89-1.74 2.98-4.3 2.98-7.39 0-.64-.06-1.26-.18-1.84z"/></svg></div>
        <div style="flex:1;"><p style="font-weight:700;">Google カレンダー</p></div>
        <button onclick="app.showToast('連係完了')" style="padding:6px 14px; border-radius:10px; border:none; background:#f1f5f9; font-weight:700; font-size:0.75rem;">連係</button>
      </div>
    </div>
    <div class="settings-section">
      <div style="display:flex; align-items:center; gap:16px;">
        <div style="width:44px; height:44px; background:#06c755; border-radius:12px; display:flex; justify-content:center; align-items:center;"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M24 10.3c0-4.7-5.4-8.5-12-8.5S0 5.6 0 10.3c0 4.2 4.3 7.7 10.1 8.4-.4-.8-.4-1.3-.1-1.9 1.8.8 1.9 1.1 2 1.3V18c6.6 0 12-3.8 12-7.7z"/></svg></div>
        <div style="flex:1;"><p style="font-weight:700;">LINE 通知</p></div>
        <button onclick="app.showToast('通知ON')" style="padding:6px 14px; border-radius:10px; border:none; background:#f1f5f9; font-weight:700; font-size:0.75rem;">ON</button>
      </div>
    </div>
  </div>

  <!-- 6. Settings Screen -->
  <div id="settings-screen" class="screen" style="padding:60px 24px; overflow-y:auto;">
    <h2 style="font-weight:800; margin-bottom:24px;">設定</h2>
    
    <div class="settings-section">
      <p style="font-size:0.8rem; font-weight:800; color:var(--text-muted); margin-bottom:16px;">デモ機能</p>
      <p style="font-size:0.75rem; color:var(--text-muted); line-height:1.5;">アプリの動作を確認するために、20種類のデモデータを投入します。</p>
      <button class="demo-btn" onclick="app.injectDemoData()">デモデータを投入する</button>
    </div>

    <div class="settings-section">
      <p style="font-size:0.8rem; font-weight:800; color:var(--text-muted); margin-bottom:16px;">プラン設定</p>
      <div style="background:linear-gradient(135deg, #10b981, #059669); padding:24px; border-radius:20px; color:#fff;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div><p style="font-weight:700; opacity:0.9;">BestB4 Premium</p><div style="font-size:1.8rem; font-weight:800; margin:4px 0;">¥480 <span style="font-size:0.9rem; font-weight:400;">/ 月</span></div></div>
          <button onclick="app.processPayment()" style="padding:10px 18px; border-radius:12px; border:none; background:#fff; color:var(--primary); font-weight:800; font-size:0.85rem;">変更</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 7. Entry Overlay -->
  <div id="entry-overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
      <h2 id="entry-title" style="font-weight:800;">アイテム登録</h2>
      <div onclick="app.closeEntry()" style="font-weight:800; padding:10px; cursor:pointer;">✕</div>
    </div>
    <div style="padding:0 4px;">
      <div style="margin-bottom:16px;"><label style="display:block; font-size:0.75rem; font-weight:800; color:var(--text-muted); margin-bottom:6px;">商品名</label><input type="text" id="entry-name" style="width:100%; padding:14px; border-radius:16px; border:1.5px solid #f1f5f9; outline:none; font-size:1rem; font-weight:600;"></div>
      <div style="display:flex; gap:16px; margin-bottom:16px;">
        <div style="flex:1.5;"><label style="display:block; font-size:0.75rem; font-weight:800; color:var(--text-muted); margin-bottom:6px;">カテゴリー</label>
          <select id="entry-cat" style="width:100%; padding:14px; border-radius:16px; border:1.5px solid #f1f5f9; outline:none; font-size:1rem; font-weight:600;">
            <option>肉</option><option>魚</option><option>野菜</option><option>乳製品・卵</option><option>飲料</option><option>調味料</option><option>作り置き</option><option>缶詰</option><option>お菓子</option><option>インスタント</option><option>冷凍食品</option><option>レトルト</option><option>乾物</option><option>その他</option>
          </select></div>
        <div style="flex:1;"><label style="display:block; font-size:0.75rem; font-weight:800; color:var(--text-muted); margin-bottom:6px;">数量</label><input type="number" id="entry-qty" value="1" style="width:100%; padding:14px; border-radius:16px; border:1.5px solid #f1f5f9; outline:none; font-size:1rem; font-weight:600;"></div>
      </div>
      <div style="margin-bottom:16px;"><label style="display:block; font-size:0.75rem; font-weight:800; color:var(--text-muted); margin-bottom:6px;">賞味期限</label><input type="date" id="entry-exp" style="width:100%; padding:14px; border-radius:16px; border:1.5px solid #f1f5f9; outline:none; font-size:1rem; font-weight:600;"></div>
      <button onclick="app.saveEntry()" style="width:100%; padding:18px; border-radius:20px; border:none; background:var(--primary); color:#fff; font-weight:800; margin-top:20px; font-size:1.1rem;">保存する</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div id="bottom-nav">
    <div class="nav-btn active" onclick="app.showScreen('list-screen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>リスト</div>
    <div class="nav-btn" onclick="app.showScreen('link-screen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>連係</div>
    <div class="nav-cam-btn" onclick="app.startCamera()"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
    <div class="nav-btn" onclick="app.showToast('履歴（アーカイブ）')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>履歴</div>
    <div class="nav-btn" onclick="app.showScreen('settings-screen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>設定</div>
  </div>

</div>

<script>
  const app = {
    db: null, stream: null, editingId: null, currentCat: "すべて",
    categories: ["肉", "魚", "野菜", "乳製品・卵", "飲料", "調味料", "作り置き", "缶詰", "お菓子", "インスタント", "冷凍食品", "レトルト", "乾物", "その他"],
    catIcons: {"すべて":"🏠","肉":"🥩","魚":"🐟","野菜":"🥬","乳製品・卵":"🥚","飲料":"🥤","調味料":"🧂","作り置き":"🍱","缶詰":"🥫","お菓子":"🍪","インスタント":"🍜","冷凍食品":"❄️","レトルト":"🍛","乾物":"🥜","その他":"📦"},

    async init() {
      // Splash sequence refinement - Aligned with 4.5s CSS animation
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        splash.style.transition = 'opacity 1s ease, background 0.8s ease';
        splash.style.background = '#fff';
        setTimeout(() => {
          this.showScreen('list-screen', true);
          document.getElementById('bottom-nav').style.display = 'flex';
          splash.style.opacity = '0';
          setTimeout(() => splash.style.display = 'none', 1000);
          this.checkReminders();
        }, 1000);
      }, 4200);
      
      await this.initDB();
      this.updateDateLabel();
      this.renderList();
    },

    initDB() {
      return new Promise(res => {
        const req = indexedDB.open("BestB4_V3", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("items", { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => { this.db = e.target.result; res(); };
      });
    },

    updateDateLabel() {
      const now = new Date(); document.getElementById('today-date').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
    },

    showScreen(id, instant = false) {
      document.querySelectorAll('.screen').forEach(s => { 
        if(s.id === 'splash-screen') return;
        s.classList.remove('active'); 
        setTimeout(() => { if(!s.classList.contains('active')) s.style.display = 'none'; }, instant ? 0 : 400); 
      });
      const t = document.getElementById(id); t.style.display = 'flex';
      if(instant) { t.classList.add('active'); t.style.opacity = '1'; }
      else { setTimeout(() => t.classList.add('active'), 50); }
      
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const navIds = {'list-screen':0, 'link-screen':1, 'settings-screen':4};
      if(navIds[id] !== undefined) document.querySelectorAll('.nav-btn')[navIds[id]].classList.add('active');
    },

    async renderList() {
      const container = document.getElementById('item-list');
      const sidebar = document.getElementById('category-sidebar');
      const search = document.getElementById('search-input').value.toLowerCase();
      const sort = document.getElementById('sort-order').value;
      
      const allItems = await this.getAllItems();
      const activeItems = allItems.filter(i => !i.archivedAt);
      
      const activeCats = ["すべて", ...this.categories.filter(c => activeItems.some(i => i.cat === c))];
      sidebar.innerHTML = "";
      activeCats.forEach(cat => {
        const tab = document.createElement('div');
        tab.className = `cat-tab ${this.currentCat === cat ? 'active' : ''}`;
        tab.innerHTML = `<i>${this.catIcons[cat]||'📦'}</i><span>${cat}</span>`;
        tab.onclick = () => { this.currentCat = cat; this.renderList(); };
        sidebar.appendChild(tab);
      });

      let items = activeItems.filter(i => {
        const matchSearch = i.name.toLowerCase().includes(search);
        const matchCat = this.currentCat === "すべて" || i.cat === this.currentCat;
        return matchSearch && matchCat;
      });
      
      if(sort === 'exp') items.sort((a,b) => new Date(a.exp) - new Date(b.exp));
      else if(sort === 'alpha') items.sort((a,b) => a.name.localeCompare(b.name, 'ja'));
      else if(sort === 'qty') items.sort((a,b) => b.qty - a.qty);

      container.innerHTML = "";
      if(items.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-muted); font-size:0.9rem;">なし</div>`;
        return;
      }

      items.forEach(item => {
        const diff = Math.ceil((new Date(item.exp) - new Date()) / 86400000);
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-icon">${this.getIcon(item.name, item.cat)}<div class="item-qty">${item.qty}</div></div>
          <div style="flex:1;">
            <div style="font-weight:700;">${item.name}</div>
            <div style="font-size:0.75rem; color:var(--text-muted);">期限: ${item.exp}</div>
          </div>
          <div style="font-size:0.8rem; font-weight:800; color:${diff <= 3 ? '#ef4444' : '#64748b'}">${diff < 0 ? '切れ' : (diff===0?'今日':`あと${diff}日`)}</div>
        `;
        container.appendChild(card);
        card.onclick = () => this.openEdit(item);
      });
    },

    getIcon(n, cat) {
      if(cat && this.catIcons[cat]) return this.catIcons[cat];
      if(n.includes('肉')) return '🥩'; if(n.includes('卵')) return '🥚';
      if(n.includes('菜')) return '🥬'; if(n.includes('果')) return '🍎';
      if(n.includes('魚')) return '🐟'; if(n.includes('飲')) return '🥤';
      return '🍱';
    },

    async getAllItems() {
      return new Promise(res => {
        const trans = this.db.transaction("items", "readonly");
        trans.objectStore("items").getAll().onsuccess = e => res(e.target.result);
      });
    },

    async injectDemoData() {
      const demoData = [
        {name:"牛乳", cat:"乳製品・卵", qty:1, exp: this.getDateAdd(2)},
        {name:"卵(10個入)", cat:"乳製品・卵", qty:1, exp: this.getDateAdd(5)},
        {name:"豚バラ肉", cat:"肉", qty:2, exp: this.getDateAdd(1)},
        {name:"鶏ささみ", cat:"肉", qty:1, exp: this.getDateAdd(3)},
        {name:"鮭の切り身", cat:"魚", qty:2, exp: this.getDateAdd(2)},
        {name:"キャベツ", cat:"野菜", qty:1, exp: this.getDateAdd(7)},
        {name:"トマト", cat:"野菜", qty:3, exp: this.getDateAdd(4)},
        {name:"納豆", cat:"その他", qty:3, exp: this.getDateAdd(6)},
        {name:"ビール", cat:"飲料", qty:6, exp: this.getDateAdd(30)},
        {name:"オレンジジュース", cat:"飲料", qty:1, exp: this.getDateAdd(10)},
        {name:"味噌", cat:"調味料", qty:1, exp: this.getDateAdd(180)},
        {name:"醤油", cat:"調味料", qty:1, exp: this.getDateAdd(365)},
        {name:"余ったカレー", cat:"作り置き", qty:1, exp: this.getDateAdd(2)},
        {name:"サバの味噌煮缶", cat:"缶詰", qty:5, exp: this.getDateAdd(700)},
        {name:"板チョコ", cat:"お菓子", qty:2, exp: this.getDateAdd(120)},
        {name:"カップヌードル", cat:"インスタント", qty:3, exp: this.getDateAdd(150)},
        {name:"冷凍さぬきうどん", cat:"冷凍食品", qty:5, exp: this.getDateAdd(90)},
        {name:"パックごはん", cat:"レトルト", qty:10, exp: this.getDateAdd(200)},
        {name:"乾燥パスタ", cat:"乾物", qty:1, exp: this.getDateAdd(500)},
        {name:"木綿豆腐", cat:"その他", qty:1, exp: this.getDateAdd(3)}
      ];
      
      const trans = this.db.transaction("items", "readwrite");
      const store = trans.objectStore("items");
      demoData.forEach(d => { d.reg = new Date().toISOString(); store.add(d); });
      trans.oncomplete = () => { this.showToast('20件のデモデータを投入しました'); this.renderList(); };
    },

    getDateAdd(days) {
      const d = new Date(); d.setDate(d.getDate() + days);
      return d.toISOString().split('T')[0];
    },

    async startCamera() {
      this.showScreen('camera-screen'); document.getElementById('bottom-nav').style.display='none';
      const v = document.getElementById('video-preview');
      try { this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); v.srcObject = this.stream; }
      catch(e) { this.showToast('カメラ許可が必要です'); }
    },
    stopCamera() {
      if(this.stream) this.stream.getTracks().forEach(t => t.stop());
      this.showScreen('list-screen'); document.getElementById('bottom-nav').style.display='flex';
    },
    async captureAndOCR() {
      const v = document.getElementById('video-preview');
      const c = document.createElement('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      c.getContext('2d').drawImage(v, 0, 0);
      document.getElementById('ocr-status').innerText = "AI解析中...";
      try {
        const { data: { text } } = await Tesseract.recognize(c, 'jpn+eng');
        this.parseOCRAndOpen(text);
      } catch(e) { this.showToast('解析失敗'); }
    },
    parseOCRAndOpen(text) {
      const name = text.split('\n')[0].replace(/[^\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff\uff66-\uff9fa-zA-Z]/g, '').substring(0,10) || "商品";
      const dateStr = new Date().toISOString().split('T')[0];
      this.openManualEntry({ name, exp: dateStr, qty: 1, cat: 'その他' });
      document.getElementById('ocr-status').innerText = "読込完了";
    },

    openManualEntry(data = null) {
      this.editingId = null;
      document.getElementById('entry-title').innerText = "アイテム登録";
      document.getElementById('entry-name').value = data ? data.name : "";
      document.getElementById('entry-exp').value = data ? data.exp : new Date().toISOString().split('T')[0];
      document.getElementById('entry-cat').value = data ? data.cat : "その他";
      document.getElementById('entry-qty').value = data ? data.qty : "1";
      document.getElementById('entry-overlay').style.display = 'flex';
      if(this.stream) this.stream.getTracks().forEach(t => t.stop());
    },
    openEdit(item) {
      this.editingId = item.id;
      document.getElementById('entry-title').innerText = "アイテム編集";
      document.getElementById('entry-name').value = item.name;
      document.getElementById('entry-cat').value = item.cat || "その他";
      document.getElementById('entry-qty').value = item.qty || "1";
      document.getElementById('entry-exp').value = item.exp;
      document.getElementById('entry-overlay').style.display = 'flex';
    },
    closeEntry() { document.getElementById('entry-overlay').style.display = 'none'; document.getElementById('bottom-nav').style.display='flex'; },
    
    async saveEntry() {
      const name = document.getElementById('entry-name').value;
      const cat = document.getElementById('entry-cat').value;
      const qty = parseInt(document.getElementById('entry-qty').value) || 1;
      const exp = document.getElementById('entry-exp').value;
      if(!name) return this.showToast('名前を入力してください');
      const trans = this.db.transaction("items", "readwrite");
      const store = trans.objectStore("items");
      if(this.editingId) store.put({ id: this.editingId, name, cat, qty, exp });
      else store.add({ name, cat, qty, exp, reg: new Date().toISOString() });
      this.closeEntry(); this.renderList(); this.showToast('保存しました');
    },

    async checkReminders() {
      const items = (await this.getAllItems()).filter(i => !i.archivedAt);
      const near = items.filter(i => (Math.ceil((new Date(i.exp) - new Date()) / 86400000)) <= 7);
      if(near.length > 0) this.showToast(`🔔 ${near.length}件の期限が近づいています`);
    },

    shareApp() { if(navigator.share) navigator.share({ title: 'BestB4', text: '食品ロス削減！', url: location.href }); },
    showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); },
    processPayment() { this.showToast('決済画面へ移行します...'); }
  };
  window.onload = () => app.init();
</script>
